    // 给微信ID添加点击复制事件
    const bubble = row.querySelector('.msg-bubble');
    bubble.querySelectorAll('.highlight-wechat').forEach(el => {
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            copyWechat();
        });
    });

    return row;
}

function addMessage(role, content) {
    messages.push({ role, content });
    saveHistory();

    const container = document.getElementById('chatMessages');
    // 隐藏欢迎和快捷问题
    const welcome = document.getElementById('welcomeArea');
    const quick = document.getElementById('quickQuestions');
    if (welcome) welcome.style.display = 'none';
    if (quick) quick.style.display = 'none';

    const row = createMessageElement(role, content, messages.length - 1);
    container.appendChild(row);
    scrollToBottom();
}

function formatContent(content) {
    // 高亮微信ID
    let formatted = content.replace(
        /(Ylc-xianyu)/g,
        '<span class="highlight-wechat" title="点击复制">$1</span>'
    );
    // 简单的加粗处理（**text**）
    formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    return formatted;
}

// ==================== 发送消息 ====================
async function sendMessage() {
    if (isLoading) return;

    // 检查 API Key
    if (DEEPSEEK_API_KEY === 'sk-94c1389bd46d474f8fdd59d9b95a3486' || DEEPSEEK_API_KEY === '') {
        addMessage('assistant', '⚠️ AI 助手还没配置好。\n\n请在 ai-chat.html 文件中找到 DEEPSEEK_API_KEY，把 "sk-你的key填在这里" 替换成你的真实 API Key。\n\n📱 也可以直接添加叶老师微信：Ylc-xianyu');
        return;
    }

    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';
    input.focus();
    showTyping();

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    try {
        // 构建 API 请求消息（系统提示词 + 历史对话）
        const apiMessages = [
            { role: 'system', content: SYSTEM_PROMPT },
        ];

        // 加入最近的对话历史
        const recentMessages = messages.slice(-MAX_HISTORY);
        recentMessages.forEach(m => {
            apiMessages.push({ role: m.role, content: m.content });
        });

        const response = await fetch(DEEPSEEK_API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
            },
            body: JSON.stringify({
                model: 'deepseek-chat',
                messages: apiMessages,
                temperature: 0.7,
                max_tokens: 800,
                top_p: 0.9,
            }),
        });

        const data = await response.json();
        hideTyping();

        if (!response.ok) {
            const errMsg = data.error?.message || `请求失败 (${response.status})`;
            console.error('DeepSeek API 错误:', errMsg);
            addMessage('assistant', '抱歉，AI 服务返回错误 😅\n\n' + errMsg + '\n\n📱 也可以直接添加叶老师微信：Ylc-xianyu');
        } else if (data.choices?.[0]?.message?.content) {
            addMessage('assistant', data.choices[0].message.content);
        } else {
            addMessage('assistant', '抱歉，我没能理解您的问题。\n\n要不您直接加叶老师微信 Ylc-xianyu，她会为您详细解答～');
        }
    } catch (err) {
        hideTyping();
        console.error('请求失败:', err);

        let hint = '';
        if (err.message === 'Failed to fetch' || err.name === 'TypeError') {
            hint = '可能是网络问题，请检查：\n① 网络连接是否正常\n② DeepSeek API 是否可访问\n③ 浏览器控制台是否有报错\n\n';
        }

        addMessage('assistant', '抱歉，消息发送失败 😅\n\n' + hint + '请稍后重试，或直接添加叶老师微信：Ylc-xianyu');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
}

// ==================== 快捷问题 ====================
function sendQuick(btn) {
    const text = btn.textContent.trim();
    document.getElementById('chatInput').value = text;
    sendMessage();
}

// ==================== 打字指示器 ====================
function showTyping() {
    hideTyping();
    const container = document.getElementById('chatMessages');
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.id = 'typingIndicator';
    indicator.innerHTML = `
        <div class="msg-avatar" style="width:34px;height:34px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;font-size:0.85rem;">🤖</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
    `;
    container.appendChild(indicator);
    scrollToBottom();
}

function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

// ==================== 滚动 ====================
function scrollToBottom() {
    const container = document.getElementById('chatMessages');
    setTimeout(() => {
        container.scrollTop = container.scrollHeight;
    }, 50);
}

// ==================== 持久化 ====================
function saveHistory() {
    try {
        localStorage.setItem('ai_chat_history', JSON.stringify(messages));
    } catch(e) { /* quota exceeded, ignore */ }
}

// ==================== 清空对话 ====================
function clearChat() {
    if (messages.length === 0) return;
    if (!confirm('确定要开始新对话吗？当前聊天记录将被清空。')) return;

    messages = [];
    localStorage.removeItem('ai_chat_history');

    const container = document.getElementById('chatMessages');
    // 显示回欢迎区域
    const welcome = document.getElementById('welcomeArea');
    const quick = document.getElementById('quickQuestions');
    if (welcome) welcome.style.display = '';
    if (quick) quick.style.display = '';

    // 清除消息元素
    container.querySelectorAll('.msg-row, .typing-indicator').forEach(el => el.remove());

    document.getElementById('chatInput').focus();
    showToast('对话已清空，开始新咨询 ✨');
}

// ==================== 复制微信 ====================
function copyWechat() {
    navigator.clipboard.writeText('Ylc-xianyu').then(() => {
        showToast('✅ 叶老师微信号已复制！打开微信搜索添加好友');
    }).catch(() => {
        showToast('微信号：Ylc-xianyu（请手动搜索添加）');
    });
}

// ==================== 语音输入 ====================
function toggleVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        showToast('您的浏览器不支持语音输入，请使用Chrome浏览器');
        return;
    }

    if (isListening) {
        stopListening();
    } else {
        startListening();
    }
}

function startListening() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.interimResults = false;
    recognition.continuous = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        if (text.trim()) {
            document.getElementById('chatInput').value = text;
            // 自动发送
            setTimeout(() => sendMessage(), 300);
        }
    };

    recognition.onerror = (e) => {
        if (e.error === 'no-speech') {
            showToast('没有检测到语音，请再试一次');
        } else if (e.error === 'aborted') {
            // 用户主动停止
        } else {
            showToast('语音识别出错，请重试');
        }
        stopListening();
    };

    recognition.onend = () => {
        stopListening();
    };

    recognition.start();
    isListening = true;
    const btn = document.getElementById('voiceBtn');
    btn.classList.add('listening');
    btn.innerHTML = '<i class="fas fa-microphone-alt"></i>';
    showToast('🎤 正在聆听…请说话');
}

function stopListening() {
    if (recognition) {
        try { recognition.stop(); } catch(e) {}
    }
    isListening = false;
    const btn = document.getElementById('voiceBtn');
    btn.classList.remove('listening');
    btn.innerHTML = '<i class="fas fa-microphone"></i>';
}

// ==================== Toast ====================
let toastTimer;
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>
